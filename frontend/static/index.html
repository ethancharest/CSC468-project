<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSC468 Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <header>
        <div class="header-inner">
            <div class="logo">
                <span class="logo-dot"></span>
                CSC468
            </div>
            <div class="header-badge" id="system-status">
                <span class="pulse"></span>
                Initializing
            </div>
        </div>
    </header>

    <main class="container">

        <div class="hero">
            <p class="hero-label">Static Site + API Architecture</p>
            <h1>Container Dashboard</h1>
            <p class="hero-sub">Nginx frontend · Flask backend · Docker network</p>
        </div>

        <div class="grid">

            <!-- Backend Status -->
            <div class="card card--status">
                <div class="card-header">
                    <span class="card-label">Backend Status</span>
                    <span class="card-icon">◎</span>
                </div>
                <p id="health-status" class="status-text">Checking...</p>
            </div>

            <!-- Stack -->
            <div class="card card--stack">
                <div class="card-header">
                    <span class="card-label">Stack</span>
                    <span class="card-icon">⬡</span>
                </div>
                <ul id="stack-list">
                    <li class="skeleton"></li>
                    <li class="skeleton"></li>
                    <li class="skeleton"></li>
                </ul>
                <p id="api-message" class="api-message"></p>
            </div>

            <!-- Container Info -->
            <div class="card card--info">
                <div class="card-header">
                    <span class="card-label">Container Info</span>
                    <span class="card-icon">⬡</span>
                </div>
                <div class="info-grid">
                    <div class="info-row">
                        <span class="info-label">Hostname</span>
                        <span id="container-hostname" class="info-value mono">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Python</span>
                        <span id="container-python" class="info-value mono">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Served at</span>
                        <span id="container-timestamp" class="info-value mono">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Response time</span>
                        <span id="response-time" class="info-value mono">—</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
